name: Snyk Agent Scan

on:
  push:
    branches: [main]
    paths:
      - "*/SKILL.md"
      - ".github/workflows/agent-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "*/SKILL.md"
      - ".github/workflows/agent-scan.yml"
  workflow_dispatch:
    inputs:
      fail_on_issues:
        description: "Fail the workflow if issues are detected"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: agent-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: false

      - name: Run Snyk Agent Scan
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          uvx snyk-agent-scan@latest --skills "$GITHUB_WORKSPACE" --json 2>&1 | tee scan-results.json
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: agent-scan-results
          path: scan-results.json
          retention-days: 30

      - name: Check for issues
        if: always() && steps.scan.outputs.exit_code != '0'
        run: |
          echo "::warning::Snyk Agent Scan detected issues. Review the uploaded scan-results.json artifact."
          fail_on="${{ github.event.inputs.fail_on_issues || 'true' }}"
          if [ "$fail_on" = "true" ]; then
            exit 1
          fi
