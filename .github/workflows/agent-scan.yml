name: Snyk Agent Scan

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      fail_on_issues:
        description: "Fail the workflow if issues are detected"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: agent-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false

      - name: Run Snyk Agent Scan
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          uvx snyk-agent-scan@latest --skills "$GITHUB_WORKSPACE" --json 1> scan-results.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: agent-scan-results
          path: scan-results.json
          retention-days: 30

      - name: Update README badges
        if: always()
        run: bash scripts/update-readme-badges.sh scan-results.json

      - name: Commit badge updates
        if: always()
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update scan badges in README"
          git push origin HEAD:main

      - name: Check for issues
        if: always() && steps.scan.outputs.exit_code != '0'
        run: |
          echo "::warning::Snyk Agent Scan detected issues. Review the uploaded scan-results.json artifact."
          fail_on="${{ github.event.inputs.fail_on_issues || 'true' }}"
          if [ "$fail_on" = "true" ]; then
            exit 1
          fi
